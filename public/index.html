<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #161b22;
            padding: 1rem 2rem;
            border-bottom: 1px solid #30363d;
        }
        .header h1 {
            font-size: 1.25rem;
            color: #58a6ff;
        }
        .header p {
            font-size: 0.875rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
        }
        .message.user {
            background: #1f6feb;
            color: white;
            margin-left: auto;
        }
        .message.assistant {
            background: #21262d;
            border: 1px solid #30363d;
        }
        .message .role {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }
        .input-container {
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 1rem 2rem;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #58a6ff;
        }
        button {
            padding: 0.75rem 1.5rem;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background: #2ea043;
        }
        button:disabled {
            background: #30363d;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            padding: 0.5rem;
            font-size: 0.875rem;
        }
        .status.connected {
            color: #3fb950;
        }
        .status.disconnected {
            color: #f85149;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Cloudflare Agent Chat</h1>
        <p>基于 Cloudflare Agents SDK v0.5.0 + Workers AI + Durable Objects</p>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            <div class="role">Agent</div>
            <div>你好！我是基于 Cloudflare Workers AI 的边缘 Agent。有什么可以帮助你的吗？</div>
        </div>
    </div>
    
    <div class="status disconnected" id="status">● 未连接</div>
    
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="输入消息..." disabled>
            <button id="sendButton" disabled>发送</button>
        </div>
    </div>

    <script>
        // 配置 - 请替换为你的 Worker URL
        const WORKER_URL = 'wss://your-worker-url.workers.dev/agent/demo-session';
        
        let ws = null;
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');

        function connect() {
            status.textContent = '● 连接中...';
            status.className = 'status';
            
            ws = new WebSocket(WORKER_URL);
            
            ws.onopen = () => {
                status.textContent = '● 已连接';
                status.className = 'status connected';
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    addMessage('assistant', data.content);
                } else if (data.type === 'error') {
                    addMessage('assistant', '❌ ' + data.content);
                }
                sendButton.textContent = '发送';
                sendButton.disabled = false;
            };
            
            ws.onclose = () => {
                status.textContent = '● 已断开';
                status.className = 'status disconnected';
                messageInput.disabled = true;
                sendButton.disabled = true;
                // 5秒后重连
                setTimeout(connect, 5000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                status.textContent = '● 连接错误';
                status.className = 'status disconnected';
            };
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="role">${role === 'user' ? '你' : 'Agent'}</div>
                <div>${escapeHtml(content)}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            addMessage('user', message);
            ws.send(JSON.stringify({ message }));
            messageInput.value = '';
            sendButton.textContent = '';
            sendButton.appendChild(document.createElement('span')).className = 'loading';
            sendButton.disabled = true;
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 启动连接
        connect();
    </script>
</body>
</html>
